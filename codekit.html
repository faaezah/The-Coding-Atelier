<!DOCTYPE html>
<html>
<head>
  <title>CodeKit</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #fdeef4;
      color: #B76E79;
      font-size: 20px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header, nav, footer {
      background-color: #e75480;
      text-align: center;
      color: #fff;
    }
    header { padding: 30px; }
    nav { padding: 10px; }
    nav a { color: #fff; text-decoration: none; margin: 0 15px; font-size: 1.2em; }
    nav a:hover { color: #ffe6ed; }
    main { flex: 1; display: flex; justify-content: center; align-items: center; }
    .content { display: flex; flex-direction: column; gap: 20px; align-items: center; }
    button {
      padding: 10px 20px;
      font-size: 1em;
      border-radius: 5px;
      border: 2px solid #e75480;
      background-color: #e75480;
      color: #fff;
      cursor: pointer;
    }
    button:hover { background-color: #B76E79; }
  </style>
</head>
<body>
<header><h1>The Coding Atelier</h1></header>
<nav>
  <a href="index.html">Home</a>
  <a href="AboutMe.html">About</a>
  <a href="Faaezah.html">Meet The Team</a>
  <a href="gallery.html">Gallery</a>
  <a href="donate.html">Donate</a>
  <a href="pin.html">Online Codekit</a>
  <a href="resources.html">Resources</a>
  <a href="metrics.html">Impact</a>
  <a href="Contact.html">Contact</a>
</nav>
<main>
  <div class="content">
    <!-- Signed in email -->
    <h2 id="userInfo">Loading user...</h2>

    <!-- Progress text underneath -->
    <p id="progressDisplay">Loading progress...</p>

    <!-- Buttons stacked underneath -->
    <div style="margin-top:20px; display:flex; flex-direction:column; gap:10px; align-items:center;">
      <button id="showProgress" style="display:none;">Click to See Progress</button>
    </div>
    <button id="goActivities">Go to Activities</button>

  </div>
</main>

<style>
  footer {
    background: #ffffff;
    padding: 40px 0;
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #333;
  }

  .footer-brand {
    font-size: 16px;
    font-weight: 600;
    color: #d94f9f; /* soft pink */
    margin-bottom: 10px;
  }

  .footer-tagline {
    font-size: 14px;
    color: #555;
    margin-top: 12px;
  }

  .footer-icons {
    margin: 20px 0;
    display: flex;
    justify-content: center;
    gap: 18px;
  }

  .footer-icons a {
    width: 40px;
    height: 40px;
    background: #ffe6f2; /* pastel pink */
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    transition: all .2s ease;
    color: #d94f9f;
  }

  .footer-icons a:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 14px rgba(0,0,0,0.12);
  }

  .footer-icons svg {
    width: 22px;
    height: 22px;
  }
</style>

<footer>
  <div class="footer-brand">
    © 2026 The Coding Atelier
  </div>

  <div class="footer-icons">

    <!-- Instagram Icon -->
    <a href="https://www.instagram.com/thecodingatelierbyfaaezah/" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M7.75 2h8.5A5.75 5.75 0 0122 7.75v8.5A5.75 5.75 0 0116.25 22h-8.5A5.75 5.75 0 012 16.25v-8.5A5.75 5.75 0 017.75 2zm0 1.5A4.25 4.25 0 003.5 7.75v8.5A4.25 4.25 0 007.75 20.5h8.5a4.25 4.25 0 004.25-4.25v-8.5A4.25 4.25 0 0016.25 3.5h-8.5zM12 7a5 5 0 110 10 5 5 0 010-10zm0 1.5a3.5 3.5 0 100 7 3.5 3.5 0 000-7zm5.25-.75a1.25 1.25 0 11-2.5 0 1.25 1.25 0 012.5 0z"/>
      </svg>
    </a>

    <!-- YouTube Icon -->
    <a href="https://www.youtube.com/@theCodingAtelierByFaaezah" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M21.8 8.001s-.2-1.4-.8-2c-.8-.8-1.6-.8-2-.9C16.2 5 12 5 12 5h-.1s-4.2 0-7 .1c-.4.1-1.2.1-2 .9-.6.6-.8 2-.8 2S1 9.6 1 11.2v1.6c0 1.6.2 3.2.2 3.2s.2 1.4.8 2c.8.8 1.8.8 2.2.9 2.8.1 7 .1 7 .1s4.2 0 7-.1c.4-.1 1.2-.1 2-.9.6-.6.8-2 .8-2s.2-1.6.2-3.2v-1.6c0-1.6-.2-3.2-.2-3.2zM10 14.5V9.5l5 2.5-5 2.5z"/>

    <a href="https://linktr.ee/TheCodingAtelierByFaaezah" target="_blank">

        <path d="M12 2l4 7h-8l4-7zm0 20l-4-12h8l-4 12zm8-13l-3 2 3 2c.6.4.8 1.2.4 1.8-.4.6-1.2.8-1.8.4l-4-2.5 4-2.5c.6-.4.8-1.2.4-1.8-.4-.6-1.2-.8-1.8-.4zm-16 0c-.6-.4-1.4-.2-1.8.4-.4.6-.2 1.4.4 1.8l3 2-3 2c-.6.4-.8 1.2-.4 1.8.4.6 1.2.8 1.8.4l4-2.5-4-2.5z"/>

  <div class="footer-tagline">
    Building accessible tech education, one CodeKit at a time.

</footer>


<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB6bWIy-y_N6k7F12BZQfDxni85qrIe-Lw",
    authDomain: "the-coding-atelier.firebaseapp.com",
    projectId: "the-coding-atelier",
    storageBucket: "the-coding-atelier.firebasestorage.app",
    messagingSenderId: "469308886574",
    appId: "1:469308886574:web:f70cc92a1cdc63916299bf",
    measurementId: "G-2974BEEE3T"
  };


  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let cachedProgress = null;

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      document.getElementById("userInfo").textContent = "Signed in as " + user.email;

      const snap = await getDoc(doc(db, "progress", user.uid));
      cachedProgress = snap.exists() ? snap.data().step : 0;

      document.getElementById("showProgress").style.display = "inline-block";
    } else {
      window.location.href = "signin.html";
    }
  });

  document.getElementById("goActivities").addEventListener("click", () => {
    window.location.href = "activities.html";
  });

  document.getElementById("showProgress").addEventListener("click", () => {
    document.getElementById("progressDisplay").textContent = "Your progress: Step " + cachedProgress;
  });
</script>

</body>
</html>
