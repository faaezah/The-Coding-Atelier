    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #FDF2F6; /* soft modern pink */
            color: #3A2A3E;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER — gradient theme */
        header {
            background: linear-gradient(135deg, #E47A9F, #C95A82);
            padding: 45px 20px;
            text-align: center;
            color: white;
            border-bottom: 1px solid #F7DCE6;
        }

        header h1 {
            margin: 0;
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* NAV — white bar theme */
        nav {
            background-color: #ffffff;
            padding: 15px 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            justify-content: center;
            border-bottom: 1px solid #F3C9D8;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        nav a {
            color: #B03E6F;
            text-decoration: none;
            font-weight: 500;
            padding: 6px 4px;
            border-bottom: 2px solid transparent;
            transition: 0.25s ease;
        }

        nav a:hover {
            border-bottom: 2px solid #E46C96;
            color: #8A2F57;
        }

        /* CONTACT FORM CARD */
        .contact-form {
            max-width: 900px;
            margin: 50px auto;
            background-color: #ffffff;
            padding: 40px 50px;
            border-radius: 16px;
            border: 2px solid #F3C9D8;
            box-shadow: 0px 10px 28px rgba(230, 120, 160, 0.15);
        }

        .contact-form h2 {
            color: #8A2F57;
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.8rem;
            font-weight: 600;
        }

        .contact-form label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #8A2F57;
            font-size: 1rem;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 18px;
            border: 2px solid #F3C9D8;
            border-radius: 10px;
            font-size: 1rem;
            background: #fff;
            transition: 0.25s ease;
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            outline: none;
            border-color: #E47A9F;
            box-shadow: 0 0 6px rgba(228, 122, 159, 0.3);
        }

        .contact-form button {
            background: linear-gradient(135deg, #E47A9F, #C95A82);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 14px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            max-width: 220px;
            display: block;
            margin: 0 auto;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0px 6px 18px rgba(230, 120, 160, 0.25);
        }

        .contact-form button:hover {
            transform: translateY(-3px);
            box-shadow: 0px 10px 24px rgba(230, 120, 160, 0.35);
        }

        /* FOOTER — white bar theme */
        footer {
            background-color: #ffffff;
            text-align: center;
            color: #8A2F57;
            padding: 20px 0;
            border-top: 1px solid #F3C9D8;
            font-size: 0.95rem;
        }

        footer a {
            color: #B03E6F;
            text-decoration: none;
            font-weight: 600;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .footer-icon img {
            width: 24px;
            height: 24px;
            margin-left: 8px;
            vertical-align: middle;
        }
    </style>

</head>

<div class="contact-form">
    <h2>We'd Love to Hear From You!</h2>
    <form action="https://formspree.io/f/movejgng" method="POST">
        <label for="name">Your Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>

        <label for="email">Your Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label for="message">Your Message:</label>
        <textarea id="message" name="message" rows="5" placeholder="Enter your message" required></textarea>

        <button type="submit">Send Message</button>
    </form>

</div>
