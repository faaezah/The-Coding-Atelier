<!DOCTYPE html>
<html>
<head>
    <title>Enter PIN</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #FDF2F6; /* soft modern pink */
            color: #3A2A2E;
            font-size: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER — gradient theme */
        header {
            background: linear-gradient(135deg, #E47A9F, #C95A82);
            padding: 45px 20px;
            text-align: center;
            color: white;
            border-bottom: 1px solid #F7DCE6;
        }

        header h1 {
            margin: 0;
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* NAV — white bar theme */
        nav {
            background-color: #ffffff;
            padding: 15px 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            justify-content: center;
            border-bottom: 1px solid #F3C9D8;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        nav a {
            color: #B03E6F;
            text-decoration: none;
            font-weight: 500;
            padding: 6px 4px;
            border-bottom: 2px solid transparent;
            transition: 0.25s ease;
        }

        nav a:hover {
            border-bottom: 2px solid #E46C96;
            color: #8A2F57;
        }

        /* MAIN CONTENT */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .content {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            background: #ffffff;
            border: 2px solid #F3C9D8;
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0px 10px 28px rgba(230, 120, 160, 0.15);
            text-align: center;
        }

        /* BUTTONS */
        button {
            padding: 12px 28px;
            font-size: 1.1em;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #E47A9F, #C95A82);
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s ease;
            box-shadow: 0px 6px 18px rgba(230, 120, 160, 0.25);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0px 10px 24px rgba(230, 120, 160, 0.35);
        }

        /* FOOTER — white bar theme */
        footer {
            background-color: #ffffff;
            text-align: center;
            color: #8A2F57;
            padding: 20px 0;
            border-top: 1px solid #F3C9D8;
            font-size: 0.95rem;
        }
       .footer-icon img {
      width: 24px;
      height: 24px;
      margin-left: 8px;
      vertical-align: middle;
    }
    </style>

</head>
<body>
<header><h1>The Coding Atelier</h1></header>
<nav>
    <a href="index.html">Home</a>
    <a href="AboutMe.html">About</a>
    <a href="Faaezah.html">Founder</a>
    <a href="gallery.html">Gallery</a>
    <a href="donate.html">Donate</a>
    <a href="pin.html">Online Codekit</a>
    <a href="resources.html">Resources</a>
    <a href="metrics.html">Impact</a>
    <a href="Contact.html">Contact</a>
</nav>
<main>
    <form id="pinForm">
        <h2>Enter PIN to Continue</h2>
        <input type="password" id="pinInput" placeholder="Enter PIN" required>
        <button type="submit">Submit</button>
    </form>
</main>

<footer>
    <p>&copy; 2025 The Coding Atelier by Faaezah. All rights reserved.</p>
    <div class="footer-icon">
        <a href="https://www.youtube.com/@TheCodingAtelierbyFaaezah" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/42/YouTube_icon_%282013-2017%29.png" alt="YouTube">
            Follow on YouTube
        </a>
    </div>
</footer>

<script>
    const correctPin = "404030";
    document.getElementById("pinForm").addEventListener("submit", (e) => {
      e.preventDefault();
      if (document.getElementById("pinInput").value === correctPin) {
        window.location.href = "account.html";
      } else {
        alert("Incorrect PIN");
      }
    });
</script>
</body>
</html>
